<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deportivo Italia Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --pitch:#0E4C86;
    --pitch-dark:#082A4D;
    --chalk:#FFFFFF;
    --page:#F2F6FB;
    --chalk-dim:#E1E8EF;
    --red:#C23B33;
    --green:#1FA855;
    --ink:#162233;
    --muted:#6b7585;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;color:var(--ink);background:var(--pitch-dark);}
  .dia-title{font-family:'Oswald',sans-serif;letter-spacing:.5px;}
  button{cursor:pointer;font-family:'Inter',sans-serif;}
  input,select{font-family:'Inter',sans-serif;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#c9d2dd;border-radius:4px;}

  #app{display:flex;min-height:100vh;}

  /* Sidebar */
  #sidebar{width:220px;background:var(--pitch-dark);padding:24px 14px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  #sidebar .brand{display:flex;align-items:center;gap:10px;}
  #sidebar .brand .logo{width:38px;height:38px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--pitch-dark);font-weight:800;}
  #sidebar .brand .names .t1{color:#fff;font-size:14px;font-weight:700;line-height:1.1;}
  #sidebar .brand .names .t2{color:var(--green);font-size:10px;letter-spacing:1px;font-weight:600;}
  .nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:#fff;font-weight:600;font-size:13.5px;text-align:left;transition:background .15s,color .15s;}
  .nav-btn:hover{background:#ffffff14;}
  .nav-btn.active{background:var(--green);color:var(--pitch-dark);}
  #sidebar .footer{margin-top:auto;padding:14px 8px 0;border-top:1px solid #ffffff22;}
  #sidebar .footer .sched{color:#ffffff80;font-size:10.5px;line-height:1.5;}
  #sidebar .footer .status{font-size:10.5px;margin-top:8px;display:flex;align-items:center;gap:5px;}
  #sidebar .footer .status.ok{color:var(--green);}
  #sidebar .footer .status.err{color:#FFB4AC;}

  /* Main */
  #main{flex:1;background:var(--page);padding:28px 32px;overflow-y:auto;max-height:100vh;}

  h1.page-title{font-size:24px;margin:0 0 4px;}
  p.page-sub{color:var(--muted);margin:0 0 22px;font-size:13.5px;}

  /* Stat pills */
  .stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px;}
  .stat-pill{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--chalk-dim);border-radius:10px;padding:14px 16px;flex:1;min-width:150px;}
  .stat-pill .icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:16px;}
  .stat-pill .val{font-size:20px;font-weight:800;line-height:1.1;}
  .stat-pill .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

  /* Badge */
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;display:inline-block;}
  .badge.neutral{background:#E7ECF2;color:#52606d;}
  .badge.good{background:#DCEFE3;color:#1F6E45;}
  .badge.bad{background:#F6DEDB;color:var(--red);}
  .badge.warn{background:#FBEFD0;color:#8A6512;}

  /* Category cards (home) */
  .cat-grid{display:flex;gap:14px;flex-wrap:wrap;}
  .cat-card{flex:1 1 200px;background:var(--pitch);border-radius:12px;padding:20px 18px;border:none;text-align:left;color:#fff;min-width:180px;}
  .cat-card .eyebrow{font-size:11px;color:var(--green);font-weight:700;letter-spacing:1px;margin-bottom:6px;}
  .cat-card .big{font-size:30px;font-weight:700;}
  .cat-card .sub{font-size:13px;opacity:.85;margin-top:4px;}

  /* Toolbar */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .btn-primary{display:flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:13px;}
  .btn-primary.green{background:var(--green);}
  .filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .chip{border:1.5px solid var(--chalk-dim);background:transparent;color:var(--ink);border-radius:100px;padding:6px 16px;font-weight:700;font-size:12.5px;}
  .chip.active{border-color:var(--pitch);background:var(--pitch);color:#fff;}
  .search-wrap{position:relative;margin-left:auto;}
  .search-wrap input{padding:8px 10px 8px 30px;border-radius:8px;border:1px solid var(--chalk-dim);font-size:13px;width:190px;}
  .search-wrap .si{position:absolute;left:10px;top:9px;color:#999;font-size:13px;}

  /* Athlete cards */
  .ath-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .ath-card{text-align:left;background:#fff;border:1px solid var(--chalk-dim);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px;}
  .ath-card .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--pitch);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .ath-card .name{font-weight:700;font-size:14.5px;}
  .ath-card .meta{font-size:12px;color:var(--muted);}
  .ath-card .attend{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:5px;}

  /* Detail/profile */
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--pitch);font-weight:700;font-size:13px;margin-bottom:16px;padding:0;}
  .profile-head{display:flex;gap:18px;align-items:center;margin-bottom:22px;flex-wrap:wrap;}
  .avatar.big{width:64px;height:64px;font-size:22px;}
  .profile-head h1{margin:0;font-size:24px;}
  .badges-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}

  .section{margin-bottom:24px;}
  .section h3{font-size:15px;margin:0 0 12px;color:var(--pitch);}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
  .field .lbl{font-size:10.5px;color:#999;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;}
  .field .val{font-size:13.5px;font-weight:600;}

  .attend-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .attend-cell{border:1px solid var(--chalk-dim);border-radius:10px;padding:10px 12px;min-width:110px;background:#fff;}
  .attend-cell.presente{background:#DCEFE3;}
  .attend-cell.ausente{background:#F6DEDB;}
  .attend-cell .day{font-size:11px;color:var(--muted);font-weight:600;}
  .attend-cell .date{font-size:12.5px;font-weight:700;margin-bottom:6px;}
  .attend-cell .btns{display:flex;gap:5px;}
  .attend-cell button{flex:1;border-radius:6px;padding:5px 0;font-size:12px;background:#fff;}
  .attend-cell button.ok{border:1px solid var(--pitch);color:var(--pitch);}
  .attend-cell button.ok.on{background:var(--pitch);color:#fff;}
  .attend-cell button.no{border:1px solid var(--red);color:var(--red);}
  .attend-cell button.no.on{background:var(--red);color:#fff;}

  .tor-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--chalk-dim);border-radius:8px;padding:10px 14px;margin-bottom:8px;}
  .tor-row .tname{font-weight:700;font-size:13.5px;}
  .tor-row .tmeta{font-size:12px;color:var(--muted);}

  /* Admin */
  .admin-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .admin-tab{border:1px solid var(--chalk-dim);border-radius:8px;padding:8px 14px;font-weight:700;font-size:12.5px;background:#fff;color:var(--ink);}
  .admin-tab.active{background:var(--pitch);color:#fff;border-color:var(--pitch);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  table thead tr{background:var(--chalk-dim);text-align:left;}
  table th{padding:10px 12px;font-weight:700;font-size:11.5px;text-transform:uppercase;color:var(--muted);}
  table td{padding:10px 12px;border-top:1px solid var(--chalk-dim);}
  .link-btn{border:none;background:none;color:var(--pitch);font-weight:700;font-size:12.5px;}

  .mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
  .mat-card{background:#fff;border:1px solid var(--chalk-dim);border-radius:10px;padding:14px;}
  .mat-card .row1{display:flex;justify-content:space-between;margin-bottom:6px;}
  .mat-card .row1 .name{font-weight:700;font-size:13.5px;}
  .mat-card .info{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .mat-card .btns{display:flex;gap:8px;}
  .mat-card .btns button{flex:1;border-radius:6px;padding:7px 0;font-weight:700;font-size:12px;background:#fff;}
  .mat-card .btns .bp{border:1px solid var(--pitch);color:var(--pitch);}
  .mat-card .btns .bp.on{background:var(--pitch);color:#fff;}
  .mat-card .btns .bd{border:1px solid var(--red);color:var(--red);}
  .mat-card .btns .bd.on{background:var(--red);color:#fff;}

  .torneo-card{background:#fff;border:1px solid var(--chalk-dim);border-radius:10px;padding:16px;margin-bottom:14px;}
  .torneo-card .head{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .torneo-card .tname{font-weight:700;font-size:15px;}
  .torneo-card .tmeta{font-size:12.5px;color:var(--muted);display:flex;gap:10px;margin-top:2px;}
  .pay-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .pay-chip{border:1px solid var(--chalk-dim);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:600;background:#fff;color:var(--ink);display:flex;align-items:center;gap:5px;}
  .pay-chip.paid{border-color:var(--pitch);background:#DCEFE3;color:#1F6E45;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;}
  .modal .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal .mh h3{margin:0;font-size:17px;}
  .modal .mh button{border:none;background:none;font-size:18px;}
  .modal label{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.3px;}
  .modal input,.modal select{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--chalk-dim);font-size:13px;margin-bottom:12px;}
  .modal .row2{display:flex;gap:10px;}
  .modal .row2 > div{flex:1;}
  .modal .save-btn{width:100%;background:var(--pitch);color:#fff;border:none;border-radius:8px;padding:11px 0;font-weight:700;font-size:13.5px;margin-top:6px;}
  .modal .save-btn.red{background:var(--red);}
  .modal .save-btn:disabled{opacity:.5;cursor:not-allowed;}

  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:10px;}
  .empty-msg{color:#999;font-size:13px;}

  /* View mode toggle */
  .view-toggle{display:flex;border:1px solid var(--chalk-dim);border-radius:8px;overflow:hidden;}
  .view-toggle button{border:none;background:#fff;padding:7px 11px;color:var(--muted);display:flex;align-items:center;transition:background .15s,color .15s;}
  .view-toggle button.active{background:var(--pitch);color:#fff;}
  .view-toggle button:first-child{border-right:1px solid var(--chalk-dim);}
  /* List view */
  .ath-list{display:flex;flex-direction:column;background:#fff;border:1px solid var(--chalk-dim);border-radius:12px;overflow:hidden;}
  .ath-list-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-top:1px solid var(--chalk-dim);cursor:pointer;transition:background .12s;border:none;background:transparent;text-align:left;width:100%;}
  .ath-list-row:first-child{border-top:none;}
  .ath-list-row:hover{background:var(--page);}
  .ath-list-row .info{flex:1;min-width:0;}
  .ath-list-row .name{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ath-list-row .meta{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .ath-list-row .stats{display:flex;align-items:center;gap:20px;flex-shrink:0;}
  .ath-list-row .stat-item{text-align:center;min-width:46px;}
  .ath-list-row .stat-item .sv{font-size:14px;font-weight:800;color:var(--ink);}
  .ath-list-row .stat-item .sl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;line-height:1.2;}
  .ath-list-row .arr{color:var(--muted);}
  .list-header{display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--chalk-dim);font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .list-header .lh-info{flex:1;}
  .list-header .lh-stats{display:flex;gap:20px;}

  /* Charts */
  .charts-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px;}
  .chart-card{background:#fff;border:1px solid var(--chalk-dim);border-radius:12px;padding:16px 18px;flex:1;min-width:280px;}
  .chart-card h4{margin:0 0 12px;font-size:13px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.4px;}
  .chart-card.small{min-width:220px;}
  .chart-wrap{position:relative;height:220px;}
  .chart-wrap.short{height:160px;}

  /* Attendance registration tab */
  .reg-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;background:#fff;border:1px solid var(--chalk-dim);border-radius:10px;padding:14px 16px;}
  .reg-field{display:flex;flex-direction:column;gap:4px;}
  .reg-field label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
  .reg-field select,.reg-field input{padding:8px 10px;border-radius:7px;border:1px solid var(--chalk-dim);font-size:13px;}
  .reg-hint{font-size:11.5px;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:6px;}
  .reg-table{background:#fff;border:1px solid var(--chalk-dim);border-radius:10px;overflow:hidden;}
  .reg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--chalk-dim);}
  .reg-row:first-child{border-top:none;}
  .reg-row .who{display:flex;align-items:center;gap:10px;}
  .reg-row .who .name{font-weight:700;font-size:13.5px;}
  .reg-row .who .sub{font-size:11.5px;color:var(--muted);}
  .reg-row .opts{display:flex;gap:6px;}
  .reg-row .opts button{border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;background:#fff;}
  .reg-row .opts .ok{border:1px solid var(--pitch);color:var(--pitch);}
  .reg-row .opts .ok.on{background:var(--pitch);color:#fff;}
  .reg-row .opts .no{border:1px solid var(--red);color:var(--red);}
  .reg-row .opts .no.on{background:var(--red);color:#fff;}
  .reg-summary{display:flex;gap:14px;margin-bottom:14px;}
</style>
</head>
<body>

<div id="app"><div class="loading-screen"><div style="font-size:28px;">🛡️</div><div style="font-size:13px;opacity:.8;">Cargando datos de la academia…</div></div></div>

<script>
/* ============================================================
   DEPORTIVO ITALIA ACADEMY — Sistema de Gestión (HTML/JS puro)
   Paleta: blanco + azul institucional + verde vivo
   ============================================================ */

const CATEGORIES = ["U6","U8","U10","U12"];
const TRAINING_DAYS = ["Lunes","Miércoles","Viernes"];
const FIRST_NAMES = ["Mateo","Santiago","Luca","Diego","Gabriel","Andrés","Tomás","Adrián","Bruno","Emilio","Valentina","Sofía","Camila","Isabella","Renata","Antonella","Mariana","Lucía","Paola","Giulia"];
const LAST_NAMES = ["Rossi","Conti","Ferraro","Marino","Greco","Lombardi","Bruno","Romano","Esposito","Russo","Mancini","Gallo","Costa","Fontana","Rizzo"];

function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function makeAthlete(category, idx){
  const fn = FIRST_NAMES[(idx*3+category.length) % FIRST_NAMES.length];
  const ln = LAST_NAMES[(idx*5+2) % LAST_NAMES.length];
  const ageBase = {U6:5,U8:7,U10:9,U12:11}[category];
  return {
    id: uid("ath"),
    nombre: fn, apellido: ln, categoria: category,
    edad: ageBase + (idx%2),
    fechaNacimiento: `${2026-(ageBase+(idx%2))}-0${(idx%9)+1}-1${idx%9}`,
    posicion: ["Portero","Defensa","Mediocampo","Delantero"][idx%4],
    representante: `${LAST_NAMES[(idx+7)%LAST_NAMES.length]}, familia`,
    telefono: `+58 412-${(1000000+idx*137).toString().slice(0,7)}`,
    direccion: "Caracas, Venezuela",
    fechaIngreso: `2025-0${(idx%9)+1}-0${(idx%8)+1}`,
    matricula: { estado: idx%4===0 ? "pendiente":"pagado", monto:35, fecha:"2026-06-01" },
    torneos: [],
    asistenciaEntrenamiento: {},
    asistenciaJuegos: {},
  };
}
function seedAthletes(){
  let list = [];
  CATEGORIES.forEach(cat => {
    const count = cat==="U6"?8 : cat==="U8"?10 : cat==="U10"?9 : 7;
    for(let i=0;i<count;i++) list.push(makeAthlete(cat,i));
  });
  return list;
}
function seedTorneos(){
  return [
    { id: uid("tor"), nombre:"Copa Apertura Caracas", fecha:"2026-07-12", categoria:"U10", monto:25 },
    { id: uid("tor"), nombre:"Torneo Relámpago Italia Cup", fecha:"2026-07-26", categoria:"U12", monto:30 },
    { id: uid("tor"), nombre:"Festival U6/U8 Valle Arriba", fecha:"2026-08-02", categoria:"U6", monto:15 },
  ];
}
function attendanceRate(obj){
  const vals = Object.values(obj);
  if(vals.length===0) return 0;
  const present = vals.filter(v=>v==="presente").length;
  return Math.round((present/vals.length)*100);
}
function lastNDates(n, weekday){
  const dayMap = {Domingo:0,Lunes:1,Martes:2,"Miércoles":3,Jueves:4,Viernes:5,"Sábado":6};
  const results = [];
  let d = new Date();
  let guard = 0;
  while(results.length < n && guard < 200){
    guard++;
    const dow = d.getDay();
    let match = false;
    if(weekday==="weekend") match = dow===0 || dow===6;
    else match = dayMap[weekday]===dow;
    if(match){
      results.push(d.toISOString().slice(0,10) + "|" + (weekday==="weekend" ? (dow===0?"Domingo":"Sábado") : weekday));
    }
    d = new Date(d.getTime() - 86400000);
  }
  return results.reverse();
}

/* ---------------- STATE ---------------- */
const state = {
  athletes: [],
  torneos: [],
  loaded: false,
  saveError: false,
  view: "home",
  activeCategory: "Todos",
  selectedId: null,
  search: "",
  adminTab: "atletas",
  regTipo: "training",
  regDate: todayISOPlaceholder(),
  regCategory: "Todos",
  athViewMode: "grid", // grid | list
};
function todayISOPlaceholder(){ return new Date().toISOString().slice(0,10); }

/* ---------------- PERSISTENCE ---------------- */
const API = "/api/data";
const HEADERS = {"Content-Type":"application/json"};

async function loadData(){
  try{
    const res = await fetch(API);
    const d = await res.json();

    if(d.athletes && d.athletes.length){ state.athletes = d.athletes; }
    else {
      state.athletes = seedAthletes();
      fetch(API,{method:"POST",headers:HEADERS,body:JSON.stringify({key:"athletes",value:state.athletes})}).catch(()=>{});
    }
    if(d.torneos && d.torneos.length){ state.torneos = d.torneos; }
    else {
      state.torneos = seedTorneos();
      fetch(API,{method:"POST",headers:HEADERS,body:JSON.stringify({key:"torneos",value:state.torneos})}).catch(()=>{});
    }
  }catch(e){
    console.warn("No se pudo conectar al servidor, usando datos locales.");
    state.athletes = seedAthletes();
    state.torneos = seedTorneos();
  }finally{
    state.loaded = true;
    render();
  }
}
async function saveAthletes(){
  try{
    const res = await fetch(API,{method:"POST",headers:HEADERS,body:JSON.stringify({key:"athletes",value:state.athletes})});
    const d = await res.json();
    state.saveError = !d.success;
  }catch(e){ state.saveError = true; }
  renderSaveStatus();
}
async function saveTorneos(){
  try{
    const res = await fetch(API,{method:"POST",headers:HEADERS,body:JSON.stringify({key:"torneos",value:state.torneos})});
    const d = await res.json();
    state.saveError = !d.success;
  }catch(e){ state.saveError = true; }
  renderSaveStatus();
}

/* ---------------- MUTATIONS ---------------- */
function updateAthlete(id, patch){
  const a = state.athletes.find(x=>x.id===id);
  Object.assign(a, patch);
  saveAthletes();
}
function toggleAttendance(athleteId, type, dateKey, status){
  const a = state.athletes.find(x=>x.id===athleteId);
  const field = type==="training" ? "asistenciaEntrenamiento" : "asistenciaJuegos";
  if(a[field][dateKey]===status) delete a[field][dateKey];
  else a[field][dateKey] = status;
  saveAthletes();
  render();
}
function addAthlete(data){
  const newA = makeAthlete(data.categoria, state.athletes.length+1);
  Object.assign(newA, {
    nombre:data.nombre, apellido:data.apellido, edad:Number(data.edad),
    categoria:data.categoria, posicion:data.posicion, representante:data.representante,
    telefono:data.telefono, fechaNacimiento:data.fechaNacimiento,
    matricula:{ estado:"pendiente", monto:35, fecha:todayISO() },
  });
  state.athletes.push(newA);
  saveAthletes();
  closeModal();
  render();
}
function addTorneo(data){
  state.torneos.push({ id: uid("tor"), nombre:data.nombre, fecha:data.fecha, categoria:data.categoria, monto:Number(data.monto) });
  saveTorneos();
  closeModal();
  render();
}
function setMatricula(athleteId, estado){
  const a = state.athletes.find(x=>x.id===athleteId);
  a.matricula = { ...a.matricula, estado, fecha: todayISO() };
  saveAthletes();
  render();
}
function setTorneoPago(athleteId, torneoId, pagado){
  const a = state.athletes.find(x=>x.id===athleteId);
  a.torneos = a.torneos.filter(t=>t.torneoId!==torneoId);
  if(pagado) a.torneos.push({ torneoId, fecha: todayISO() });
  saveAthletes();
  render();
}

function renderSaveStatus(){
  const el = document.getElementById("saveStatus");
  if(!el) return;
  el.className = "status " + (state.saveError?"err":"ok");
  el.innerHTML = state.saveError? ic.alert+" Error al guardar" : ic.check+" Datos guardados";
}

function renderHome(){
  const totalAthletes = state.athletes.length;
  const matriculasPendientes = state.athletes.filter(a=>a.matricula.estado==="pendiente").length;
  const ingresos = state.athletes.filter(a=>a.matricula.estado==="pagado").reduce((s,a)=>s+a.matricula.monto,0);

  const catCards = CATEGORIES.map(cat=>{
    const count = state.athletes.filter(a=>a.categoria===cat).length;
    return `<button class="cat-card" data-goto-cat="${cat}">
      <div class="eyebrow">CATEGORÍA</div>
      <div class="big dia-title">${cat}</div>
      <div class="sub">${count} atletas registrados</div>
    </button>`;
  }).join("");

  return `
    <h1 class="page-title dia-title">Resumen de la Academia</h1>
    <p class="page-sub">Deportivo Italia Academy — temporada 2026</p>
    <div class="stats-row">
      ${statPill(ic.users,"Atletas activos",totalAthletes,"var(--pitch)")}
      ${statPill(ic.alert,"Matrículas pendientes",matriculasPendientes,"var(--red)")}
      ${statPill(ic.dollar,"Ingresos matrícula","$"+ingresos,"var(--green)")}
      ${statPill(ic.trophy,"Torneos activos",state.torneos.length,"var(--pitch)")}
    </div>
    <h2 class="dia-title" style="font-size:16px;margin:0 0 12px;">Atletas por categoría</h2>
    <div class="cat-grid">${catCards}</div>

    <h2 class="dia-title" style="font-size:16px;margin:26px 0 12px;">Indicadores generales</h2>
    <div class="charts-row">
      <div class="chart-card"><h4>Atletas por categoría</h4><div class="chart-wrap"><canvas id="chartHomeCat"></canvas></div></div>
      <div class="chart-card small"><h4>Estado de matrícula</h4><div class="chart-wrap"><canvas id="chartHomeMatricula"></canvas></div></div>
      <div class="chart-card small"><h4>Asistencia promedio (entrenamientos)</h4><div class="chart-wrap"><canvas id="chartHomeAsistencia"></canvas></div></div>
    </div>
  `;
}

function renderAthleteList(){
  const filtered = state.athletes.filter(a=>{
    const matchCat = state.activeCategory==="Todos" || a.categoria===state.activeCategory;
    const matchSearch = (a.nombre+" "+a.apellido).toLowerCase().includes(state.search.toLowerCase());
    return matchCat && matchSearch;
  });
  const chips = ["Todos",...CATEGORIES].map(cat=>
    `<button class="chip ${state.activeCategory===cat?"active":""}" data-cat="${cat}">${cat}</button>`
  ).join("");

  let athleteHtml = "";
  if(filtered.length === 0){
    athleteHtml = `<p class="empty-msg">No se encontraron atletas.</p>`;
  } else if(state.athViewMode === "grid"){
    athleteHtml = `<div class="ath-grid">${filtered.map(a=>{
      const rate = attendanceRate(a.asistenciaEntrenamiento);
      return `<button class="ath-card" data-open="${a.id}">
        <div class="top">
          <div class="avatar">${initials(a)}</div>
          ${badge(a.matricula.estado, a.matricula.estado==="pagado"?"good":"bad")}
        </div>
        <div class="name">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</div>
        <div class="meta">${a.categoria} · ${a.posicion} · ${a.edad} años</div>
        <div class="attend">${ic.activity} Asistencia: ${rate}%</div>
      </button>`;
    }).join("")}</div>`;
  } else {
    // LIST VIEW
    const header = `<div class="list-header">
      <div style="width:32px;flex-shrink:0;"></div>
      <div class="lh-info">Atleta</div>
      <div class="lh-stats">
        <div style="min-width:46px;text-align:center;">Edad</div>
        <div style="min-width:80px;text-align:center;">Posición</div>
        <div style="min-width:70px;text-align:center;">Asist. %</div>
        <div style="min-width:72px;text-align:center;">Matrícula</div>
        <div style="width:20px;"></div>
      </div>
    </div>`;
    const rows = filtered.map(a=>{
      const rate = attendanceRate(a.asistenciaEntrenamiento);
      return `<button class="ath-list-row" data-open="${a.id}">
        <div class="avatar" style="width:34px;height:34px;font-size:12px;flex-shrink:0;">${initials(a)}</div>
        <div class="info">
          <div class="name">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</div>
          <div class="meta">${a.categoria} · Representante: ${escapeHtml(a.representante)}</div>
        </div>
        <div class="stats">
          <div class="stat-item"><div class="sv">${a.edad}</div><div class="sl">Años</div></div>
          <div class="stat-item"><div class="sv" style="font-size:11px;font-weight:700;">${a.posicion}</div><div class="sl">Posición</div></div>
          <div class="stat-item"><div class="sv" style="color:${rate>=70?"var(--green)":rate>=40?"var(--pitch)":"var(--red)"}">${rate}%</div><div class="sl">Asistencia</div></div>
          <div class="stat-item">${badge(a.matricula.estado, a.matricula.estado==="pagado"?"good":"bad")}</div>
          <div class="arr">${ic.arr}</div>
        </div>
      </button>`;
    }).join("");
    athleteHtml = `<div class="ath-list">${header}${rows}</div>`;
  }

  return `
    <div class="toolbar">
      <h1 class="page-title dia-title" style="margin:0;">Atletas</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="view-toggle">
          <button class="${state.athViewMode==="grid"?"active":""}" id="btnViewGrid" title="Cuadrícula">${ic.grid}</button>
          <button class="${state.athViewMode==="list"?"active":""}" id="btnViewList" title="Lista">${ic.list}</button>
        </div>
        <button class="btn-primary" id="btnAddAthlete">${ic.plus} Nuevo atleta</button>
      </div>

function attendGrid(sessions, record, athleteId, type){
  return `<div class="attend-grid">${sessions.map(s=>{
    const [date,day] = s.split("|");
    const status = record[s];
    return `<div class="attend-cell ${status||""}">
      <div class="day">${day}</div><div class="date">${date}</div>
      <div class="btns">
        <button class="ok ${status==="presente"?"on":""}" data-attend="${athleteId}|${type}|${s}|presente">${ic.check}</button>
        <button class="no ${status==="ausente"?"on":""}" data-attend="${athleteId}|${type}|${s}|ausente">${ic.x}</button>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function renderAthleteDetail(){
  const a = state.athletes.find(x=>x.id===state.selectedId);
  if(!a) return `<p>Atleta no encontrado.</p>`;
  let trainingSessions = [];
  TRAINING_DAYS.forEach(day => { trainingSessions = trainingSessions.concat(lastNDates(3, day)); });
  trainingSessions.sort();
  const gameSessions = lastNDates(6, "weekend");

  const trainRate = attendanceRate(a.asistenciaEntrenamiento);
  const gameRate = attendanceRate(a.asistenciaJuegos);
  const trainPresent = Object.values(a.asistenciaEntrenamiento).filter(v=>v==="presente").length;
  const trainTotal = Object.keys(a.asistenciaEntrenamiento).length;
  const gamePresent = Object.values(a.asistenciaJuegos).filter(v=>v==="presente").length;
  const gameTotal = Object.keys(a.asistenciaJuegos).length;
  window.__athDetailData = {
    trainPresent, trainAusente: trainTotal - trainPresent,
    gamePresent, gameAusente: gameTotal - gamePresent,
  };

  const torneosCat = state.torneos.filter(t=>t.categoria===a.categoria);
  const torneosHtml = torneosCat.length ? torneosCat.map(t=>{
    const pagado = a.torneos.some(at=>at.torneoId===t.id);
    return `<div class="tor-row"><div><div class="tname">${escapeHtml(t.nombre)}</div><div class="tmeta">${t.fecha} · $${t.monto}</div></div>${badge(pagado?"Pagado":"Pendiente", pagado?"good":"bad")}</div>`;
  }).join("") : `<p class="empty-msg">Sin torneos para esta categoría.</p>`;

  return `
    <button class="back-btn" id="btnBack">${ic.back} Volver a atletas</button>
    <div class="profile-head">
      <div class="avatar big">${initials(a)}</div>
      <div>
        <h1 class="dia-title">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</h1>
        <div class="badges-row">
          ${badge(a.categoria,"neutral")}${badge(a.posicion,"neutral")}
          ${badge("Matrícula "+a.matricula.estado, a.matricula.estado==="pagado"?"good":"bad")}
        </div>
      </div>
    </div>
    <div class="stats-row">
      ${statPill(ic.trend,"Asist. entrenamiento", trainRate+"%","var(--pitch)")}
      ${statPill(ic.trophy,"Asist. juegos", gameRate+"%","var(--green)")}
      ${statPill(ic.check,"Entren. presentes", trainPresent+"/"+trainTotal,"var(--pitch)")}
      ${statPill(ic.check,"Juegos presentes", gamePresent+"/"+gameTotal,"var(--green)")}
    </div>

    <div class="section"><h3 class="dia-title">Estadísticas</h3>
      <div class="chart-card"><h4>Entrenamientos vs. juegos</h4><div class="chart-wrap short"><canvas id="chartAthDetail"></canvas></div></div>
    </div>

    <div class="section"><h3 class="dia-title">Datos personales</h3>
      <div class="field-grid">
        <div class="field"><div class="lbl">Fecha de nacimiento</div><div class="val">${a.fechaNacimiento}</div></div>
        <div class="field"><div class="lbl">Edad</div><div class="val">${a.edad} años</div></div>
        <div class="field"><div class="lbl">Representante</div><div class="val">${escapeHtml(a.representante)}</div></div>
        <div class="field"><div class="lbl">Teléfono</div><div class="val">${escapeHtml(a.telefono)}</div></div>
        <div class="field"><div class="lbl">Dirección</div><div class="val">${escapeHtml(a.direccion)}</div></div>
        <div class="field"><div class="lbl">Fecha de ingreso</div><div class="val">${a.fechaIngreso}</div></div>
      </div>
    </div>

    <div class="section"><h3 class="dia-title">Asistencia a entrenamientos (Lun · Mié · Vie)</h3>
      ${attendGrid(trainingSessions, a.asistenciaEntrenamiento, a.id, "training")}
    </div>

    <div class="section"><h3 class="dia-title">Asistencia a juegos (fin de semana)</h3>
      ${attendGrid(gameSessions, a.asistenciaJuegos, a.id, "game")}
    </div>

    <div class="section"><h3 class="dia-title">Torneos</h3>${torneosHtml}</div>
  `;
}

function dayNameFromDate(iso){
  const names = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const d = new Date(iso + "T12:00:00");
  return names[d.getDay()];
}
function renderAttendanceTab(){
  const dayName = state.regDate ? dayNameFromDate(state.regDate) : "";
  const dateKey = state.regDate ? `${state.regDate}|${dayName}` : "";
  const isTraining = state.regTipo === "training";
  const field = isTraining ? "asistenciaEntrenamiento" : "asistenciaJuegos";
  const validDay = isTraining ? TRAINING_DAYS.includes(dayName) : (dayName==="Sábado" || dayName==="Domingo");

  const filtered = state.athletes.filter(a => state.regCategory==="Todos" || a.categoria===state.regCategory);
  const presentes = filtered.filter(a => a[field][dateKey]==="presente").length;
  const ausentes = filtered.filter(a => a[field][dateKey]==="ausente").length;
  const sinMarcar = filtered.length - presentes - ausentes;

  const catChips = ["Todos",...CATEGORIES].map(cat=>
    `<button class="chip ${state.regCategory===cat?"active":""}" data-regcat="${cat}">${cat}</button>`
  ).join("");

  const rows = filtered.map(a=>{
    const status = a[field][dateKey];
    return `<div class="reg-row">
      <div class="who"><div class="avatar" style="width:32px;height:32px;font-size:12px;">${initials(a)}</div>
        <div><div class="name">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</div><div class="sub">${a.categoria} · ${a.posicion}</div></div>
      </div>
      <div class="opts">
        <button class="ok ${status==="presente"?"on":""}" data-regattend="${a.id}|presente">${ic.check} Presente</button>
        <button class="no ${status==="ausente"?"on":""}" data-regattend="${a.id}|ausente">${ic.x} Ausente</button>
      </div>
    </div>`;
  }).join("") || `<p class="empty-msg" style="padding:16px;">No hay atletas en esta categoría.</p>`;

  return `
    <h1 class="page-title dia-title">Registrar Asistencia</h1>
    <p class="page-sub">Marca presente o ausente por fecha, para entrenamientos o juegos</p>

    <div class="reg-controls">
      <div class="reg-field"><label>Tipo</label>
        <select id="regTipoSelect">
          <option value="training" ${isTraining?"selected":""}>Entrenamiento (Lun · Mié · Vie)</option>
          <option value="game" ${!isTraining?"selected":""}>Juego (fin de semana)</option>
        </select>
      </div>
      <div class="reg-field"><label>Fecha</label>
        <input type="date" id="regDateInput" value="${state.regDate}">
      </div>
      ${state.regDate ? `<div class="reg-hint">${validDay? ic.check : ic.alert} ${dayName}${validDay ? "" : (isTraining ? " — no es día de entrenamiento" : " — no es fin de semana")}</div>` : ""}
    </div>

    <div class="filters">${catChips}</div>

    <div class="reg-summary">
      ${statPill(ic.check,"Presentes",presentes,"var(--green)")}
      ${statPill(ic.x,"Ausentes",ausentes,"var(--red)")}
      ${statPill(ic.clock,"Sin marcar",sinMarcar,"var(--pitch)")}
    </div>

    <div class="chart-card" style="margin-bottom:18px;">
      <h4>Asistencia del día por categoría</h4>
      <div class="chart-wrap short"><canvas id="chartRegDay"></canvas></div>
    </div>

    <div class="reg-table">${rows}</div>
  `;
}
function renderAdmin(){
  const totalIngresos = state.athletes.filter(a=>a.matricula.estado==="pagado").reduce((s,a)=>s+a.matricula.monto,0);
  const torneoIngresos = state.torneos.reduce((sum,t)=>{
    const pagantes = state.athletes.filter(a=>a.torneos.some(at=>at.torneoId===t.id)).length;
    return sum + pagantes*t.monto;
  },0);
  const pendientes = state.athletes.filter(a=>a.matricula.estado==="pendiente").length;

  const tabs = [
    {key:"atletas",label:"Todos los atletas"},
    {key:"matriculas",label:"Pagos de matrícula"},
    {key:"torneos",label:"Torneos y pagos"},
  ].map(t=>`<button class="admin-tab ${state.adminTab===t.key?"active":""}" data-admintab="${t.key}">${t.label}</button>`).join("");

  let body = "";
  if(state.adminTab==="atletas"){
    const rows = state.athletes.map(a=>`<tr>
      <td style="font-weight:600;">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</td>

      <tbody>${rows}</tbody></table></div>`;
  } else if(state.adminTab==="matriculas"){
    const cards = state.athletes.map(a=>`<div class="mat-card">
      <div class="row1"><div class="name">${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</div>${badge(a.categoria,"neutral")}</div>
      <div class="info">Monto: $${a.matricula.monto} · Última fecha: ${a.matricula.fecha}</div>
      <div class="btns">
        <button class="bp ${a.matricula.estado==="pagado"?"on":""}" data-matricula="${a.id}|pagado">Pagado</button>
        <button class="bd ${a.matricula.estado==="pendiente"?"on":""}" data-matricula="${a.id}|pendiente">Pendiente</button>
      </div></div>`).join("");
    body = `<div class="mat-grid">${cards}</div>`;
  } else {
    const torneosHtml = state.torneos.map(t=>{
      const elegibles = state.athletes.filter(a=>a.categoria===t.categoria);
      const pagantes = elegibles.filter(a=>a.torneos.some(at=>at.torneoId===t.id));
      const chips = elegibles.map(a=>{
        const pagado = a.torneos.some(at=>at.torneoId===t.id);
        return `<button class="pay-chip ${pagado?"paid":""}" data-torneopago="${a.id}|${t.id}|${pagado?0:1}">
          ${pagado?ic.check:ic.clock} ${escapeHtml(a.nombre)} ${escapeHtml(a.apellido)}</button>`;
      }).join("");
      return `<div class="torneo-card">
        <div class="head">
          <div><div class="tname">${escapeHtml(t.nombre)}</div>
            <div class="tmeta"><span>${ic.cal} ${t.fecha}</span><span>Categoría ${t.categoria}</span><span>$${t.monto} por atleta</span></div>
          </div>
          ${badge(pagantes.length+"/"+elegibles.length+" pagado","warn")}
        </div>
        <div class="pay-chips">${chips}</div>
      </div>`;
    }).join("");
    body = `<div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="btn-primary" id="btnAddTorneo">${ic.plus} Nuevo torneo</button>
    </div>${torneosHtml}`;
  }

  return `
    <h1 class="page-title dia-title">Panel Administrativo</h1>
    <p class="page-sub">Control de atletas, matrículas y torneos</p>
    <div class="stats-row">
      ${statPill(ic.users,"Total atletas", state.athletes.length,"var(--pitch)")}
      ${statPill(ic.card,"Ingresos matrícula", "$"+totalIngresos,"var(--green)")}
      ${statPill(ic.trophy,"Ingresos torneos", "$"+torneoIngresos,"var(--red)")}
      ${statPill(ic.alert,"Matrículas pendientes", pendientes,"var(--red)")}
    </div>
    <div class="admin-tabs">${tabs}</div>
    <div class="charts-row">
      <div class="chart-card small"><h4>Matrículas: pagado vs. pendiente</h4><div class="chart-wrap short"><canvas id="chartAdminMatricula"></canvas></div></div>
      <div class="chart-card"><h4>Recaudación por torneo ($)</h4><div class="chart-wrap short"><canvas id="chartAdminTorneos"></canvas></div></div>
    </div>
    ${body}
  `;
}

/* ---------------- CHARTS ---------------- */
const CHART_COLORS = { pitch:"#0E4C86", green:"#1FA855", red:"#C23B33", grayBg:"#E1E8EF", ink:"#162233" };
function destroyChart(id){
  window.__charts = window.__charts || {};
  if(window.__charts[id]){ window.__charts[id].destroy(); delete window.__charts[id]; }
}
function makeChart(id, config){
  window.__charts = window.__charts || {};
  destroyChart(id);
  const ctx = document.getElementById(id);
  if(!ctx || typeof Chart === "undefined") return;
  window.__charts[id] = new Chart(ctx, config);
}
const baseOpts = { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ font:{ family:"Inter", size:11 } } } } };

function drawHomeCharts(){
  const catCounts = CATEGORIES.map(c => state.athletes.filter(a=>a.categoria===c).length);
  makeChart("chartHomeCat", { type:"bar", data:{ labels:CATEGORIES, datasets:[{ label:"Atletas", data:catCounts, backgroundColor:CHART_COLORS.pitch, borderRadius:6 }] },
    options:{ ...baseOpts, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } } });

  const pagado = state.athletes.filter(a=>a.matricula.estado==="pagado").length;
  const pendiente = state.athletes.length - pagado;
  makeChart("chartHomeMatricula", { type:"doughnut", data:{ labels:["Pagado","Pendiente"], datasets:[{ data:[pagado,pendiente], backgroundColor:[CHART_COLORS.green, CHART_COLORS.red] }] },
    options:{ ...baseOpts, cutout:"65%" } });

  const catAttend = CATEGORIES.map(c=>{
    const list = state.athletes.filter(a=>a.categoria===c);
    if(!list.length) return 0;
    const avg = list.reduce((s,a)=>s+attendanceRate(a.asistenciaEntrenamiento),0)/list.length;
    return Math.round(avg);
  });
  makeChart("chartHomeAsistencia", { type:"bar", data:{ labels:CATEGORIES, datasets:[{ label:"% Asistencia", data:catAttend, backgroundColor:CHART_COLORS.green, borderRadius:6 }] },
    options:{ ...baseOpts, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, max:100 } } } });
}

function drawAthListChart(){
  const catAttend = CATEGORIES.map(c=>{
    const list = state.athletes.filter(a=>a.categoria===c);
    if(!list.length) return 0;
    const avg = list.reduce((s,a)=>s+attendanceRate(a.asistenciaEntrenamiento),0)/list.length;
    return Math.round(avg);
  });
  makeChart("chartAthListAttend", { type:"bar", data:{ labels:CATEGORIES, datasets:[{ label:"% Asistencia", data:catAttend, backgroundColor:CHART_COLORS.pitch, borderRadius:6 }] },

function drawAthDetailChart(){

    data:{ labels:["Entrenamientos","Juegos"], datasets:[
      { label:"Presente", data:[d.trainPresent, d.gamePresent], backgroundColor:CHART_COLORS.green, borderRadius:6 },

function drawAdminCharts(){

  const pendiente = state.athletes.length - pagado;

function drawRegChart(){

/* ---------------- MAIN RENDER + EVENTS ---------------- */
function render(){
  if(!state.loaded){
    document.getElementById("app").innerHTML = `<div class="loading-screen"><div style="font-size:28px;">🛡️</div><div style="font-size:13px;opacity:.8;">Cargando datos de la academia…</div></div>`;
    return;
  }
  let mainContent = "";
  if(state.view==="home") mainContent = renderHome();
  else if(state.view==="atleta-list") mainContent = renderAthleteList();
  else if(state.view==="atleta-detail") mainContent = renderAthleteDetail();
  else if(state.view==="asistencia") mainContent = renderAttendanceTab();
  else if(state.view==="admin") mainContent = renderAdmin();

  document.getElementById("app").innerHTML = `${renderSidebar()}<div id="main">${mainContent}</div>`;
  attachEvents();

  if(state.view==="home") drawHomeCharts();
  else if(state.view==="atleta-list") drawAthListChart();
  else if(state.view==="atleta-detail") drawAthDetailChart();
  else if(state.view==="asistencia") drawRegChart();
  else if(state.view==="admin") drawAdminCharts();
}

function attachEvents(){
  document.querySelectorAll("[data-nav]").forEach(btn=>{
    btn.onclick = ()=>{ state.view = btn.dataset.nav; if(state.view!=="atleta-detail") state.selectedId=null; render(); };
  });
  document.querySelectorAll("[data-goto-cat]").forEach(btn=>{
    btn.onclick = ()=>{ state.activeCategory = btn.dataset.gotoCat; state.view="atleta-list"; render(); };
  });
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.onclick = ()=>{ state.activeCategory = btn.dataset.cat; render(); };
  });
  const searchInput = document.getElementById("searchInput");
  if(searchInput){
    searchInput.oninput = (e)=>{ state.search = e.target.value; render(); document.getElementById("searchInput").focus(); document.getElementById("searchInput").selectionStart = document.getElementById("searchInput").selectionEnd = state.search.length; };
  }
  document.querySelectorAll("[data-open]").forEach(btn=>{
    btn.onclick = ()=>{ state.selectedId = btn.dataset.open; state.view = "atleta-detail"; render(); };
  });
  const backBtn = document.getElementById("btnBack");
  if(backBtn) backBtn.onclick = ()=>{ state.view="atleta-list"; render(); };
  const addAthBtn = document.getElementById("btnAddAthlete");
  if(addAthBtn) addAthBtn.onclick = openAddAthleteModal;
  const addTorBtn = document.getElementById("btnAddTorneo");
  if(addTorBtn) addTorBtn.onclick = openAddTorneoModal;
  document.querySelectorAll("[data-attend]").forEach(btn=>{
    btn.onclick = ()=>{
      const [athleteId, type, dateKey, status] = btn.dataset.attend.split("|");
      toggleAttendance(athleteId, type, dateKey, status);
    };
  });
  document.querySelectorAll("[data-admintab]").forEach(btn=>{
    btn.onclick = ()=>{ state.adminTab = btn.dataset.admintab; render(); };
  });
  document.querySelectorAll("[data-matricula]").forEach(btn=>{
    btn.onclick = ()=>{
      const [id, estado] = btn.dataset.matricula.split("|");
      setMatricula(id, estado);
    };
  });
  document.querySelectorAll("[data-torneopago]").forEach(btn=>{
    btn.onclick = ()=>{
      const [athleteId, torneoId, flag] = btn.dataset.torneopago.split("|");
      setTorneoPago(athleteId, torneoId, flag==="1");
    };
  });
  const btnViewGrid = document.getElementById("btnViewGrid");
  if(btnViewGrid) btnViewGrid.onclick = ()=>{ state.athViewMode="grid"; render(); };
  const btnViewList = document.getElementById("btnViewList");
  if(btnViewList) btnViewList.onclick = ()=>{ state.athViewMode="list"; render(); };

  const regTipoSelect = document.getElementById("regTipoSelect");
  if(regTipoSelect) regTipoSelect.onchange = (e)=>{ state.regTipo = e.target.value; render(); };
  const regDateInput = document.getElementById("regDateInput");
  if(regDateInput) regDateInput.onchange = (e)=>{ state.regDate = e.target.value; render(); };
  document.querySelectorAll("[data-regcat]").forEach(btn=>{
    btn.onclick = ()=>{ state.regCategory = btn.dataset.regcat; render(); };
  });
  document.querySelectorAll("[data-regattend]").forEach(btn=>{
    btn.onclick = ()=>{
      const [athleteId, status] = btn.dataset.regattend.split("|");
      const dayName = dayNameFromDate(state.regDate);
      const dateKey = `${state.regDate}|${dayName}`;
      toggleAttendance(athleteId, state.regTipo, dateKey, status);
    };
  });
}

/* ---------------- INIT ---------------- */
loadData();
</script>
</body>
</html>
